services:
  # Backend API
  - type: web
    name: trocaria-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --timeout 120 --max-requests 500 --max-requests-jitter 50 --log-level warning --keep-alive 2
    healthCheckPath: /__warmup
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PYTHONUNBUFFERED
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: RENDER
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
    disk:
      name: tmp
      mountPath: /tmp
      sizeGB: 0.5

  # Frontend Static Site
  - type: static
    name: trocaria-web
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        sync: false
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "public, max-age=86400"
      - path: "/assets/*"
        name: "Cache-Control"
        value: "public, max-age=31536000, immutable"
    redirects:
      - source: "/*"
        destination: "/index.html"
        type: rewrite