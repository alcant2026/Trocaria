<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Textura de Asfalto -->
    <pattern id="asphalt" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#222" />
      <circle cx="2" cy="2" r="1.5" fill="#333" />
      <circle cx="8" cy="7" r="1" fill="#111" />
      <circle cx="5" cy="5" r="0.5" fill="#555" />
      <circle cx="1" cy="8" r="1" fill="#1a1a1a" />
      <circle cx="8" cy="2" r="0.5" fill="#4a4a4a" />
    </pattern>
  </defs>
  
  <!-- Fundo Preto do Ícone -->
  <rect width="100" height="100" rx="20" fill="#000000" />
  
  <!-- Base da Letra P (A Estrada Secundária) -->
  <path d="M 35 85 L 35 25 Q 35 15 50 15 L 60 15 Q 80 15 80 35 Q 80 55 60 55 L 35 55" 
        fill="none" stroke="url(#asphalt)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
        
  <!-- Bordas Exteriores Amarelas da Estrada (Simulando faixas de retenção) -->
  <path d="M 35 85 L 35 25 Q 35 15 50 15 L 60 15 Q 80 15 80 35 Q 80 55 60 55 L 35 55" 
        fill="none" stroke="#FFCC00" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.1" />

  <!-- Faixa Central Amarela e Tracejada (Estilo C6) -->
  <path d="M 35 85 L 35 25 Q 35 15 50 15 L 60 15 Q 80 15 80 35 Q 80 55 60 55 L 35 55" 
        fill="none" stroke="#FFCC00" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
